### VIS config — Villarrica 2015 eruption ###
# Villarrica erupted March 3, 2015 (sub-Plinian, VEI 3)
# Short but intense eruption — lava fountain ~1.5 km height
# Same bulletin files as Calbuco 2015 (same year, IS02/IS08/IS13/IS14/IS41)

[DATES]
StartDate = 2015-02-01T00:00:00
EndDate   = 2015-05-01T00:00:00

[VOLCANOES]
VolcanoesTable = 'volcanoes.csv'
Area = []
Regions = []
VolcanoesList = ['Villarrica']

[STATIONS]
StationsTable = 'stations.csv'
# Same South American stations as Calbuco — already downloaded
StationList = ['I02AR', 'I08BO', 'I13CL', 'I14CL', 'I41PY']

[PATHS]
VeffRatios    = './data/veffrat'
Bulletins     = './data/bulletins'
BackAziInterp = false
CompiledData  = './data/compiled'
Results       = './data/results'

[FORMATS]
VeffFormat = false

[PROCESSING]
WindowLength          = 7200
Timeshift             = 300
PersistencyThreshold  = 33
Dazim                 = 10
ForceDazim            = true
MaxDist               = 5000
MaxAmp                = 500
IPThreshold           = 100
NotificationInterval  = 10800
DeltaClose            = 21600
NumBazStd             = 2
StaCloseConfidence    = 500
MinMeanFreq           = 1.0
MaxMeanFreq           = 3.0
RefSpeed              = 0.30
