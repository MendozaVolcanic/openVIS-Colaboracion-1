### VIS config — Hudson 2011 eruption ###
# Hudson Cerro erupted Oct 26-27, 2011 (VEI 1-2, small ash plume ~5 km)
# Test of VIS minimum detection threshold at long range
# Window EXCLUDES Puyehue activity (Jun-Aug 2011)
# 2011 has full BGR veff + ARCADE → using same configuration as De Negri reference run

[DATES]
StartDate = 2011-09-01T00:00:00
EndDate   = 2011-12-01T00:00:00

[VOLCANOES]
VolcanoesTable = 'volcanoes.csv'
Area = []
Regions = []
VolcanoesList = ['Hudson. Cerro']

[STATIONS]
StationsTable = 'stations.csv'
StationList = ['I02AR', 'I08BO', 'I13CL', 'I14CL', 'I41PY']

[PATHS]
VeffRatios    = './data/veffrat'
Bulletins     = './data/bulletins'
BackAziInterp = false
CompiledData  = './data/compiled'
Results       = './data/results'

[FORMATS]
VeffFormat = 'BGR'

[PROCESSING]
WindowLength          = 7200
Timeshift             = 300
PersistencyThreshold  = 33
Dazim                 = 5
ForceDazim            = false
MaxDist               = 5000
MaxAmp                = 500
IPThreshold           = 100
NotificationInterval  = 10800
DeltaClose            = 21600
NumBazStd             = 2
StaCloseConfidence    = 500
MinMeanFreq           = 1.0
MaxMeanFreq           = 3.0
RefSpeed              = 0.30
